[database]
host = "localhost"
port = 5432
user = "postgres"
password = "postgres"
dbname = "tilefeed_example"

[updates]
debounce_ms = 200
worker_concurrency = 4

[serve]
host = "127.0.0.1"
port = 3000

# Single source using the native Rust MVT encoder (no Tippecanoe/GDAL needed)
[[sources]]
name = "parks"
mbtiles_path = "./examples/native-generation/parks.mbtiles"
min_zoom = 0
max_zoom = 8
generation_backend = "native"

[[sources.layers]]
name = "parks"
schema = "public"
table = "parks"
geometry_column = "geom"
id_column = "id"
srid = 4326
properties = ["name", "type"]
generate_label_points = true
